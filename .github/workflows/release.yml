name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.1.0)'
        required: true
        type: string

env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - goos: linux
            goarch: amd64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          # Linux ARM64
          - goos: linux
            goarch: arm64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          # macOS Intel
          - goos: darwin
            goarch: amd64
            os: macos-14
            target: x86_64-apple-darwin
          # macOS Apple Silicon
          - goos: darwin
            goarch: arm64
            os: macos-14
            target: aarch64-apple-darwin
          # Windows x86_64
          - goos: windows
            goarch: amd64
            os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build (Unix)
        if: matrix.goos != 'windows'
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build -ldflags="-s -w -X cmfy/internal/cmd.version=${{ env.RELEASE_TAG }}" -o cmfy ./cmd/cmfy

      - name: Build (Windows)
        if: matrix.goos == 'windows'
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build -ldflags="-s -w -X cmfy/internal/cmd.version=${{ env.RELEASE_TAG }}" -o cmfy.exe ./cmd/cmfy

      - name: Package (Unix)
        if: matrix.goos != 'windows'
        run: |
          tar czvf cmfy-${{ env.RELEASE_TAG }}-${{ matrix.target }}.tar.gz cmfy

      - name: Package (Windows)
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          7z a cmfy-${{ env.RELEASE_TAG }}-${{ matrix.target }}.zip cmfy.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cmfy-${{ matrix.target }}
          path: cmfy-${{ env.RELEASE_TAG }}-${{ matrix.target }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec mv {} . \;
          sha256sum *.tar.gz *.zip > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-homebrew:
    name: Publish to Homebrew
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew tap
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          repository: byteowlz/homebrew-tap
          event-type: update-formula
          client-payload: |
            {
              "formula": "cmfy",
              "version": "${{ env.RELEASE_TAG }}",
              "repo": "${{ github.repository }}"
            }

  publish-aur:
    name: Publish to AUR (cmfy-bin)
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Generate PKGBUILD for cmfy-bin
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ env.RELEASE_TAG }}"
          VERSION="${VERSION#v}"

          # Download checksums from release assets (retry up to 5 times)
          for i in 1 2 3 4 5; do
            if gh release download "${{ env.RELEASE_TAG }}" --repo "${{ github.repository }}" --pattern "checksums.txt" --output checksums.txt; then
              break
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done

          echo "=== checksums.txt ==="
          cat checksums.txt
          echo "=== end ==="

          SHA256=$(grep "x86_64-unknown-linux-gnu.tar.gz" checksums.txt | awk '{print $1}')
          echo "SHA256=${SHA256}"

          if [ -z "$SHA256" ]; then
            echo "ERROR: Could not extract SHA256 for x86_64-unknown-linux-gnu.tar.gz"
            exit 1
          fi

          cat > PKGBUILD <<'PKGEOF'
          # Maintainer: Tommy Falkowski <tommy@byteowlz.com>
          pkgname=cmfy-bin
          pkgver=VERSION_PLACEHOLDER
          pkgrel=1
          pkgdesc="A flexible ComfyUI CLI"
          arch=('x86_64')
          url="https://github.com/byteowlz/cmfy"
          license=('MIT')
          provides=('cmfy')
          conflicts=('cmfy')
          source=("cmfy-${pkgver}.tar.gz::https://github.com/byteowlz/cmfy/releases/download/v${pkgver}/cmfy-v${pkgver}-x86_64-unknown-linux-gnu.tar.gz")
          sha256sums=('SHA256_PLACEHOLDER')

          package() {
              install -Dm755 cmfy "$pkgdir/usr/bin/cmfy"
          }
          PKGEOF

          # Replace placeholders and strip leading whitespace
          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/g" PKGBUILD
          sed -i "s/SHA256_PLACEHOLDER/${SHA256}/g" PKGBUILD
          sed -i 's/^          //' PKGBUILD

          echo "=== Generated PKGBUILD ==="
          cat PKGBUILD
          echo "=== end ==="

      - name: Publish cmfy-bin to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3.0.1
        with:
          pkgname: cmfy-bin
          pkgbuild: ./PKGBUILD
          commit_username: byteowlz
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ env.RELEASE_TAG }}"

  publish-aur-source:
    name: Publish to AUR (cmfy)
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Generate PKGBUILD for cmfy
        run: |
          set -euo pipefail
          VERSION="${{ env.RELEASE_TAG }}"
          VERSION="${VERSION#v}"

          cat > PKGBUILD <<'PKGEOF'
          # Maintainer: Tommy Falkowski <tommy@byteowlz.com>
          pkgname=cmfy
          pkgver=VERSION_PLACEHOLDER
          pkgrel=1
          pkgdesc="A flexible ComfyUI CLI"
          arch=('x86_64' 'aarch64')
          url="https://github.com/byteowlz/cmfy"
          license=('MIT')
          provides=('cmfy')
          conflicts=('cmfy-bin')
          makedepends=('go>=1.21')
          source=("${pkgname}-${pkgver}.tar.gz::https://github.com/byteowlz/cmfy/archive/v${pkgver}.tar.gz")
          sha256sums=('SKIP')

          build() {
              cd "${pkgname}-${pkgver}"
              export CGO_ENABLED=0
              go build -ldflags="-s -w -X cmfy/internal/cmd.version=v${pkgver}" -o cmfy ./cmd/cmfy
          }

          package() {
              cd "${pkgname}-${pkgver}"
              install -Dm755 cmfy "${pkgdir}/usr/bin/cmfy"
              install -Dm644 LICENSE "${pkgdir}/usr/share/licenses/${pkgname}/LICENSE"
          }
          PKGEOF

          # Replace placeholders and strip leading whitespace
          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/g" PKGBUILD
          sed -i 's/^          //' PKGBUILD

          echo "=== Generated PKGBUILD ==="
          cat PKGBUILD
          echo "=== end ==="

      - name: Publish cmfy to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3.0.1
        with:
          pkgname: cmfy
          pkgbuild: ./PKGBUILD
          commit_username: byteowlz
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ env.RELEASE_TAG }}"
